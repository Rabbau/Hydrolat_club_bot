# Alembic Configuration File

[alembic]
# path to migration scripts
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/gidrolat
script_location = alembic

# template_location = 

# sys_argv =

# in_process_logger_level = INFO

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
